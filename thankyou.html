<!DOCTYPE html>
<html>
<head>

      background: linear-gradient(135deg, #ff9a9e, #fecfef);
      color: #4a004e;
      text-align: center;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
    }

    h1 {

<body>

<div class="card">
  <h1>Thank You 💖</h1>
  <p>This meant a lot to me 😊</p>

</html>
