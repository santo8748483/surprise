<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>
  <style>
    body {
      background: linear-gradient(135deg, #ff9a9e, #fecfef);
      color: #4a004e;
      text-align: center;
      font-family: Arial;
      overflow: hidden;
    }

    h1 {
      margin-top: 100px;
      font-size: 40px;
    }

    #text {
      font-size: 20px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 25px;
      font-size: 18px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      margin: 10px;
    }

    #yesBtn {
      background: #ff4d88;
      color: white;
    }

    #noBtn {
      position: absolute;
      background: white;
      color: #ff4d88;
    }

    video {
      display: none;
      margin-top: 20px;
      width: 80%;
      border-radius: 15px;
    }
  </style>
</head>

<body>

<h1>Hey 💕</h1>
<p id="text">Do you want to see something special?</p>

<button id="yesBtn" class="btn">Yes 💖</button>
<button id="noBtn" class="btn">No 😢</button>

<br>

<video id="myVideo" controls>
  <source src="VID-20260419-WA0082.mp4" type="video/mp4">
</video>

<script>
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");
let text = document.getElementById("text");

// Position NO button initially
noBtn.style.top = "60%";
noBtn.style.left = "55%";

// YES button works normally
yesBtn.addEventListener("click", playVideo);

// NO button runs away
noBtn.addEventListener("mouseover", () => {
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  text.innerText = getCuteMessage();
});

function playVideo() {
  document.querySelector("h1").style.display = "none";
  text.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";

  let video = document.getElementById("myVideo");
  video.style.display = "block";
  video.play();

  video.onended = function() {
    window.location.href = "thankyou.html";
  }
}

// Cute messages
function getCuteMessage() {
  const messages = [
    "No? Really? 😭",
    "Don’t do this 💔",
    "Only yes allowed 😤",
    "Pleaseeee 🥺",
    "Try clicking YES 😏",
    "Why running 😂",
    "You can't escape 😈",
    "Say yes 💖"
  ];
  return messages[Math.floor(Math.random() * messages.length)];
}
</script>

</body>
</html>
