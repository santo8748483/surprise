<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>
  <style>
    body {
      background: linear-gradient(135deg, #ff9a9e, #fecfef);
      color: #4a004e;
      text-align: center;
      font-family: Arial;
      overflow: hidden;
    }

    h1 {
      margin-top: 100px;
      font-size: 40px;
    }

    #text {
      font-size: 20px;
      margin-top: 10px;
    }

    button {
      position: absolute;
      padding: 12px 25px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 25px;
      border: none;
      transition: all 0.2s ease;
    }

    #yesBtn {
      background: #ff4d88;
      color: white;
      box-shadow: 0 5px 15px rgba(255, 77, 136, 0.5);
    }

    #yesBtn:hover {
      transform: scale(1.1);
    }

    video {
      display: none;
      margin-top: 20px;
      width: 80%;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<h1>Hey 💕</h1>
<p id="text">Do you want to see something special?</p>

<button id="yesBtn">Yes 💖</button>

<video id="myVideo" controls>
  <source src="your-video.mp4" type="video/mp4">
</video>

<script>
let yesBtn = document.getElementById("yesBtn");
let text = document.getElementById("text");

// Initial position
yesBtn.style.top = "60%";
yesBtn.style.left = "45%";

// Move button randomly on hover
yesBtn.addEventListener("mouseover", () => {
  let x = Math.random() * (window.innerWidth - 120);
  let y = Math.random() * (window.innerHeight - 60);

  yesBtn.style.left = x + "px";
  yesBtn.style.top = y + "px";

  text.innerText = getCuteMessage();
});

// On click
yesBtn.addEventListener("click", playVideo);

function playVideo() {
  document.querySelector("h1").style.display = "none";
  text.style.display = "none";
  yesBtn.style.display = "none";

  let video = document.getElementById("myVideo");
  video.style.display = "block";
  video.play();

  video.onended = function() {
    window.location.href = "thankyou.html";
  }
}

// Cute messages
function getCuteMessage() {
  const messages = [
    "No option 😌",
    "Only yes allowed 💕",
    "Don't say no 😭",
    "Please click it 🥺",
    "You can't escape 😏",
    "Just say yes 😍",
    "Why running 😂",
    "It's for you 💖"
  ];
  return messages[Math.floor(Math.random() * messages.length)];
}
</script>

</body>
</html>
